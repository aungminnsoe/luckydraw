<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <radialGradient id="ball" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff3a8"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
    <radialGradient id="shine" cx="40%" cy="30%" r="30%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners for maskable icon -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Decorative glow -->
  <circle cx="256" cy="256" r="200" fill="rgba(255,180,0,0.08)"/>

  <!-- Main lottery ball -->
  <circle cx="256" cy="256" r="160" fill="url(#ball)" filter="url(#shadow)"/>

  <!-- Number 7 (classic lucky number) -->
  <text x="256" y="296" text-anchor="middle" font-family="Black Han Sans, sans-serif" font-weight="900" font-size="180" fill="#0a0a12">7</text>

  <!-- Shine highlight -->
  <ellipse cx="210" cy="200" rx="50" ry="30" fill="url(#shine)"/>
</svg>
